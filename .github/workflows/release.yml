name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # FIX: Actions braucht explizit Schreibrecht

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          zip -r ha-showcontrol-${{ steps.version.outputs.VERSION }}.zip \
            custom_components/ profiles/ hacs.json info.md README.md \
            -x "*.pyc" -x "*/__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Was ist neu
            
            Siehe [CHANGELOG.md](https://github.com/AK-Technik/OSC-Control/blob/main/CHANGELOG.md) für Details.
            
            ## Installation
            
            **HACS**: Update wird automatisch angeboten.
            
            **Manuell**: ZIP herunterladen → `custom_components/showcontrol/` 
            nach `<HA config>/custom_components/showcontrol/` kopieren → HA neu starten.
          files: ha-showcontrol-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
