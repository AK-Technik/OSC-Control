name: Release

on:
  push:
    tags:
      - "v*.*.*"   # Wird ausgelöst wenn du z.B. v1.0.1 pushst

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update manifest.json version
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.VERSION }}"/' \
            custom_components/showcontrol/manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/showcontrol/manifest.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Build ZIP
        run: |
          zip -r ha-showcontrol-${{ steps.version.outputs.VERSION }}.zip \
            custom_components/ profiles/ hacs.json info.md README.md \
            -x "*.pyc" -x "*/__pycache__/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation
            
            **HACS**: Integration wird automatisch als Update angeboten.
            
            **Manuell**: ZIP herunterladen, `custom_components/showcontrol/` 
            nach `<HA config>/custom_components/showcontrol/` kopieren, HA neu starten.
          files: ha-showcontrol-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
