<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>{% block title %}ShowControl{% endblock %} — FSK</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/">
    <span class="nav-icon">⬡</span>
    <span>SHOW<strong>CONTROL</strong></span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
      <span class="nav-link-icon">⊞</span>Dashboard
    </a>
    <a href="/monitor" class="nav-link {% if '/monitor' in request.path %}active{% endif %}">
      <span class="nav-link-icon">◉</span>Monitor
    </a>
    <a href="/diagnose" class="nav-link {% if '/diagnose' in request.path %}active{% endif %}">
      <span class="nav-link-icon">◈</span>Diagnose
    </a>
    <a href="/add" class="nav-link nav-link-add {% if '/add' in request.path %}active{% endif %}">
      <span class="nav-link-icon">＋</span>Gerät
    </a>
  </div>
</nav>

<main class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<div id="toast" class="toast hidden"></div>

<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
